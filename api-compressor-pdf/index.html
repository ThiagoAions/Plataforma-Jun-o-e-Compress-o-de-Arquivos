<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Teste Compressor Interno</title>
</head>
<body style="font-family: Arial, sans-serif; text-align: center; padding: 50px;">
    
    <h2>Compressor de PDF da Empresa 🚀</h2>
    
    <form action="http://localhost:3001/comprimir" method="POST" enctype="multipart/form-data">
        <input type="file" name="pdf" accept="application/pdf" required>
        <br><br>
        <button type="submit" style="padding: 10px 20px; cursor: pointer; font-size: 16px;">Comprimir e Baixar</button>
    </form>

</body>
</html>
